name: Documentation

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build docs (verify doc comments)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.6'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache nimble deps
        uses: actions/cache@v5
        with:
          path: ~/.nimble
          key: nimble-docs-${{ hashFiles('libp2p_mix.nimble') }}

      - name: Install deps
        run: nimble install -dy

      - name: Generate docs
        run: |
          nimble setup
          nim doc --project --index:on --outdir:build/docs libp2p_mix.nim
