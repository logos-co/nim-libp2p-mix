name: CI

on:
  push:
    branches: [master]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: linux,   builder: ubuntu-22.04, cpu: amd64, cc: gcc }
          - { os: linux,   builder: ubuntu-22.04, cpu: i386,  cc: gcc }
          - { os: macos,   builder: macos-15,     cpu: arm64, cc: clang }
          - { os: windows, builder: windows-2022, cpu: amd64, cc: gcc }
        nim:
          - { ref: '2.0.16', mm: refc }
          - { ref: '2.2.6',  mm: refc }
        exclude:
          # Trim windows × Nim 2.0 to save runner-minutes;
          # 2.2 + i386 + macos cover the spread.
          - platform: { os: windows, builder: windows-2022, cpu: amd64, cc: gcc }
            nim: { ref: '2.0.16', mm: refc }

    name: ${{ matrix.platform.os }}-${{ matrix.platform.cpu }} (Nim ${{ matrix.nim.ref }})
    runs-on: ${{ matrix.platform.builder }}
    # Windows is informational for now: test_cover_traffic crashes inside
    # `ConstantRateCoverTraffic cover_rate_fraction` on Windows runners
    # (process exits abruptly with no test-fail output). Tracked separately.
    continue-on-error: ${{ matrix.platform.os == 'windows' }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install i386 toolchain
        if: matrix.platform.cpu == 'i386'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y \
            gcc-multilib g++-multilib

      - name: Install nasm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          "C:\Program Files\NASM" | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Nim ${{ matrix.nim.ref }}
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim.ref }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set NIMFLAGS for i386
        if: matrix.platform.cpu == 'i386'
        run: |
          echo "NIMFLAGS=${NIMFLAGS} --cpu:i386 --passC:-m32 --passL:-m32" >> $GITHUB_ENV

      - name: Cache nimble deps
        id: nimble-cache
        uses: actions/cache@v5
        with:
          path: ~/.nimble
          key: nimble-${{ matrix.platform.os }}-${{ matrix.platform.cpu }}-${{ matrix.nim.ref }}-${{ hashFiles('libp2p_mix.nimble') }}

      - name: Install deps
        run: |
          nim --version
          nimble --version
          nimble install -dy

      - name: Set up project paths
        run: nimble setup

      - name: Run unit tests
        run: nimble test

      - name: Run component tests
        # Networking-heavy integration tests — skip on Windows to avoid runner flake.
        if: matrix.platform.os != 'windows'
        run: nimble testComponent
